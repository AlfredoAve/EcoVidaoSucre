  <meta name="description" content="Regístrate en EcoVida y empieza a disfrutar de productos naturales premium.">

<body class="auth-page">
  <div id="navbar-container"></div>
  <script src="js/navbarLoader.js"></script>

  <div class="auth-bg" aria-hidden="true">
    <span class="auth-orb auth-orb-1"></span>
    <span class="auth-orb auth-orb-2"></span>
    <span class="auth-orb auth-orb-3"></span>
  </div>

  <div class="container min-vh-100 d-flex align-items-center justify-content-center py-5 auth-wrap">
    <div class="row w-100 justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card auth-card">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <img src="images/logo.png" alt="EcoVida logotipo" class="auth-logo">
              <h1 class="fw-bold auth-title">Crear Cuenta</h1>
              <p class="auth-subtitle">Únete a EcoVida hoy</p>
            </div>

            <form id="registerForm">
              <div class="mb-3">
                <label for="nombre" class="form-label">Nombre Completo</label>
                <input type="text" class="form-control auth-input" id="nombre" placeholder="Juan Pérez" required autocomplete="name">
              </div>

              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control auth-input" id="email" placeholder="tu@email.com" required autocomplete="email">
              </div>

              <div class="mb-3">
                <label for="contrasena" class="form-label">Contraseña</label>
                <div class="input-group">
                  <input type="password" class="form-control auth-input" id="contrasena" placeholder="••••••••" required minlength="6" autocomplete="new-password" style="border-right:none;">
                  <button class="btn btn-outline-secondary" type="button" id="togglePass" aria-label="Mostrar contraseña" style="border-radius:0 12px 12px 0;border:1.5px solid var(--border-soft);border-left:none;background:#faf8f4;">
                    <i class="bi bi-eye" id="togglePassIcon"></i>
                  </button>
                </div>
              </div>

              <div class="mb-3">
                <label for="confirmar" class="form-label">Confirmar Contraseña</label>
                <input type="password" class="form-control auth-input" id="confirmar" placeholder="••••••••" required autocomplete="new-password">
              </div>

              <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="terminos" required>
                <label class="form-check-label small" for="terminos">
                  Acepto los <a href="terminos.html" target="_blank" rel="noopener">términos y condiciones</a>
                  y la <a href="privacidad.html" target="_blank" rel="noopener">política de privacidad</a>
                </label>
              </div>

              <button type="submit" id="submitBtn" class="btn auth-btn w-100 py-2 fw-bold">
                <i class="bi bi-person-plus"></i> Crear Cuenta
              </button>
            </form>

            <div class="alert alert-danger mt-3" id="errorAlert" style="display:none;" role="alert"></div>
            <div class="alert alert-success mt-3" id="successAlert" style="display:none;" role="alert"></div>

            <hr class="my-4">

            <p class="text-center text-muted small mb-2">¿Ya tienes cuenta?</p>
            <a href="login.html" class="btn auth-alt-btn w-100">
              Iniciar Sesión
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/bootstrap.bundle.min.js"></script>
  <script src="js/apiService.js"></script>
  <script src="js/header.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Toggle password visibility
    const toggleBtn = document.getElementById('togglePass');
    const passInput = document.getElementById('contrasena');
    const toggleIcon = document.getElementById('togglePassIcon');
    if (toggleBtn) {
      toggleBtn.addEventListener('click', () => {
        const isPassword = passInput.type === 'password';
        passInput.type = isPassword ? 'text' : 'password';
        toggleIcon.classList.toggle('bi-eye', !isPassword);
        toggleIcon.classList.toggle('bi-eye-slash', isPassword);
        toggleBtn.setAttribute('aria-label', isPassword ? 'Ocultar contraseña' : 'Mostrar contraseña');
      });
    }
  </script>

</body>
