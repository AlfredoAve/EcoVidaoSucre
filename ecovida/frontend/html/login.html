<body class="auth-page">
<div id="navbar-container"></div>
<script src="../js/navbarLoader.js"></script>

<div aria-hidden="true" class="auth-bg">
<span class="auth-orb auth-orb-1"></span>
<span class="auth-orb auth-orb-2"></span>
<span class="auth-orb auth-orb-3"></span>
</div>
<div class="container min-vh-100 d-flex align-items-center justify-content-center auth-wrap">
<div class="row w-100 justify-content-center">
<div class="col-md-5">
<div class="card auth-card">
<div class="card-body p-5">
<div class="text-center mb-4">
<img alt="EcoVida logotipo" class="auth-logo" src="../images/logo.png"/>
<h2 class="fw-bold auth-title">Iniciar Sesión</h2>
<p class="auth-subtitle">Bienvenido de vuelta</p>
</div>
<form id="loginForm">
<div class="mb-3">
<label class="form-label" for="email">Email</label>
<input class="form-control auth-input" id="email" placeholder="tu@email.com" required="" type="email"/>
</div>
<div class="mb-3">
<label class="form-label" for="contrasena">Contraseña</label>
<input class="form-control auth-input" id="contrasena" placeholder="••••••••" required="" type="password"/>
</div>
<button class="btn auth-btn w-100 py-2 fw-bold" type="submit">
<i class="bi bi-lock"></i> Iniciar Sesión
              </button>
</form>
<div class="alert alert-danger mt-3" id="errorAlert" style="display:none;"></div>
<div class="alert alert-success mt-3" id="successAlert" style="display:none;"></div>
<hr class="my-4"/>
<p class="text-center text-muted">¿No tienes cuenta?</p>
<a class="btn auth-alt-btn w-100" href="register.html">
              Crear Cuenta
            </a>
</div>
</div>
</div>
</div>
</div>
